plugins:
  # ----------------------------------------------------------------
  # Infrastructure Worker: NVIDIA Monitor
  # GPU telemetry so the empirical store records gpu_memory_mb_peak for
  # the whisper subtree (real GPU attribution).
  # ----------------------------------------------------------------
  - name: sys-mon-nvidia
    env_name: test-sys-mon
    env_file: "https://raw.githubusercontent.com/cj-mills/cjm-system-monitor-nvidia/main/environment.yml"
    package: "git+https://github.com/cj-mills/cjm-system-monitor-nvidia.git"
    interface_libs:
      - "/mnt/SN850X_8TB_EXT4/Projects/GitHub/cj-mills/cjm-plugin-system/"
      - "git+https://github.com/cj-mills/cjm-infra-plugin-system.git"

  # ----------------------------------------------------------------
  # Media Processing: ffmpeg (upstream audio prep for the sequence)
  # ----------------------------------------------------------------
  - name: ffmpeg
    env_name: test-ffmpeg
    env_file: "https://raw.githubusercontent.com/cj-mills/cjm-media-plugin-ffmpeg/main/environment.yml"
    package: "git+https://github.com/cj-mills/cjm-media-plugin-ffmpeg.git"
    interface_libs:
      - "/mnt/SN850X_8TB_EXT4/Projects/GitHub/cj-mills/cjm-plugin-system/"
      - "git+https://github.com/cj-mills/cjm-media-plugin-system.git"

  # ----------------------------------------------------------------
  # Transcription: whisper (this library, local source)
  # Pulls cjm-torch-plugin-utils from PyPI via its deps. Substrate pinned
  # to local source so the Track 19 WORKER_ENV (incl. XDG_CACHE_HOME) is
  # tested against the current substrate.
  # ----------------------------------------------------------------
  - name: whisper_local
    env_name: test-whisper
    env_file: "./environment.yml"
    package: "/mnt/SN850X_8TB_EXT4/Projects/GitHub/cj-mills/cjm-transcription-plugin-whisper/"
    interface_libs:
      - "/mnt/SN850X_8TB_EXT4/Projects/GitHub/cj-mills/cjm-plugin-system/"
      - "git+https://github.com/cj-mills/cjm-transcription-plugin-system.git"
