# Environment for cjm-capability-whisper
# Provides OpenAI Whisper with PyTorch CUDA support
name: cjm-capability-whisper
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.12

  # System dependencies (conda-managed for proper linking)
  - ffmpeg

  # Pip dependencies
  - pip
  - pip:
    # PyTorch with CUDA (adjust for target cuda version as needed)
    - torch
    - torchaudio

    # Result data noun (TranscriptionResult). Substrate (cjm-substrate) is
    # AUTO-INJECTED by `cjm-ctl install-all` (schema v2), so it is no longer
    # listed here — same reason it was dropped from capabilities.yaml interface_libs.
    - cjm-capability-primitives

    # Shared torch helpers for capabilities (release_model / cuda_oom / resolve_device)
    - cjm-substrate-torch-utils

    # Whisper and dependencies
    - openai-whisper
    - soundfile
    - numpy

    # Utilities
    - fastcore
    - pandas

    # Worker dependencies (FastAPI, uvicorn, psutil, httpx)
    - fastapi
    - uvicorn
    - psutil
    - httpx
